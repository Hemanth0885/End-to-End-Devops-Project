apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-web-app.fullname" . }}
  labels:
    {{- include "go-web-app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http
  selector:
    {{- include "go-web-app.selectorLabels" . | nindent 4 }}